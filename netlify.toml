# ============================================================
# AI DESK — Netlify 部署設定（v1.0 · independent editorial）
# ============================================================

[build]
  publish = "."
  # 純靜態站 無 build 步驟

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# 美化 URL / 的落點
[[redirects]]
  from = "/posts"
  to = "/posts/"
  status = 301

# about 若以後改路徑
[[redirects]]
  from = "/about"
  to = "/about.html"
  status = 301

# 404 fallback
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
