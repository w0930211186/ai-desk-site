<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Creator Toolkit · AI DESK</title>
<meta name="description" content="AI 創作者工具 + 學習資源完整目錄。YouTube 課程優先 · 中文為主 · 含官方 / Pricing / Docs。">
<meta property="og:image" content="https://ai-desk-tw.netlify.app/assets/og-cover.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+TC:wght@400;500;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #fafafa; --bg-card: #fff; --bg-soft: #f5f5f7;
  --text: #1c1c1e; --text-soft: #6c6c70; --text-mute: #a0a0a5;
  --border: #e5e5ea; --accent: #a855f7; --accent-hover: #9333ea;
  --free: #10b981; --paid: #f59e0b; --premium: #ef4444; --youtube: #ff0000;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
  --shadow: 0 4px 16px rgba(0,0,0,0.08);
  --shadow-lg: 0 12px 32px rgba(0,0,0,0.12);
  --radius: 14px;
}
* { box-sizing: border-box; }
body { background: var(--bg); color: var(--text); margin: 0; font-family: "Inter","Noto Sans TC",-apple-system,sans-serif; line-height: 1.6; -webkit-font-smoothing: antialiased; }
a { color: var(--accent); text-decoration: none; }
a:hover { color: var(--accent-hover); }
.wrap { max-width: 1280px; margin: 0 auto; padding: 0 1.5rem; }

.nav { background: rgba(255,255,255,0.85); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 50; padding: 1rem 0; }
.nav-inner { display: flex; justify-content: space-between; align-items: center; max-width: 1280px; margin: 0 auto; padding: 0 1.5rem; }
.nav a { font-family: "JetBrains Mono",monospace; font-size: 0.82rem; color: var(--text-soft); }
.nav a:hover { color: var(--accent); }

.hero { padding: 2.5rem 0 1rem; }
.hero h1 { font-size: clamp(2rem,5vw,3.2rem); margin: 0 0 0.5rem; letter-spacing: -0.02em; font-weight: 800; }
.hero .lead { color: var(--text-soft); font-size: 1rem; line-height: 1.6; max-width: 720px; }

.cat-tabs { display: flex; flex-wrap: wrap; gap: 0.4rem; margin: 1.5rem 0 2rem; padding: 0.5rem; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow-sm); position: sticky; top: 4rem; z-index: 40; }
.cat-tab { padding: 0.6rem 1.1rem; color: var(--text-soft); cursor: pointer; font-size: 0.92rem; font-weight: 600; border-radius: 8px; transition: all 0.18s; text-decoration: none; white-space: nowrap; }
.cat-tab:hover { background: rgba(168,85,247,0.08); color: var(--accent); }
.cat-tab.active { background: var(--accent); color: white; }

.section-h { display: flex; align-items: baseline; gap: 0.8rem; margin: 2.5rem 0 1rem; }
.section-h h2 { font-size: 1.5rem; margin: 0; font-weight: 700; }
.section-h .badge { font-family: "JetBrains Mono",monospace; font-size: 0.72rem; color: var(--text-mute); }

/* YouTube 區 - 大卡片含縮圖 */
.yt-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(310px, 1fr)); gap: 1.5rem; margin-bottom: 3rem; }
.yt-card { background: var(--bg-card); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow-sm); transition: all 0.2s; border: 1px solid var(--border); }
.yt-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); }
.yt-card a { color: inherit; text-decoration: none; display: block; }
.yt-thumb { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); height: 180px; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }
.yt-play-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.35); color: white; font-size: 4rem; opacity: 0.95; transition: opacity 0.2s; }
.yt-card:hover .yt-play-overlay { opacity: 1; background: rgba(0,0,0,0.55); }
.yt-initial { color: white; font-size: 3rem; font-weight: 800; font-family: "Inter", "Noto Sans TC", sans-serif; opacity: 0.9; }
.yt-thumb .yt-label { position: absolute; top: 0.8rem; right: 0.8rem; background: rgba(0,0,0,0.7); color: white; padding: 0.2rem 0.5rem; border-radius: 4px; font-family: "JetBrains Mono",monospace; font-size: 0.65rem; font-weight: 700; }
.yt-body { padding: 1.2rem; }
.yt-body h3 { margin: 0 0 0.4rem; font-size: 1.05rem; line-height: 1.4; color: var(--text); }
.yt-meta { font-family: "JetBrains Mono",monospace; font-size: 0.72rem; color: var(--text-mute); margin-bottom: 0.5rem; }
.yt-desc { color: var(--text-soft); font-size: 0.88rem; line-height: 1.55; margin: 0; }
.yt-go { color: var(--accent); font-weight: 600; font-size: 0.85rem; margin-top: 0.7rem; display: inline-block; }

/* 一般課程卡 - 小一點 */
.cc-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(440px, 1fr)); gap: 1.2rem; }
.cc-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); transition: all 0.2s; overflow: hidden; }
.cc-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); border-color: var(--accent); }
.cc-card a { color: inherit; text-decoration: none; display: block; }
.cc-card.free { border-left: 4px solid var(--free); }
.cc-card.paid { border-left: 4px solid var(--paid); }
.cc-card-inner { display: flex; gap: 1.2rem; padding: 1.4rem; }
.cc-favicon { width: 64px; height: 64px; border-radius: 12px; object-fit: contain; background: var(--bg-soft); padding: 8px; flex-shrink: 0; border: 1px solid var(--border); }
.cc-favicon-fallback { width: 64px; height: 64px; border-radius: 12px; background: var(--bg-soft); display: flex; align-items: center; justify-content: center; font-size: 1.8rem; flex-shrink: 0; }
.cc-card-body { flex: 1; min-width: 0; }
.cc-card-body p { color: var(--text-soft); font-size: 0.85rem; margin: 0.5rem 0 0.6rem; line-height: 1.55; }
.cc-card h3 { margin: 0 0 0.3rem; font-size: 1rem; color: var(--text); }
.cc-card .cc-type { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 100px; font-family: "JetBrains Mono",monospace; font-size: 0.65rem; font-weight: 700; margin-bottom: 0.5rem; text-transform: uppercase; }
.cc-card .cc-type.free { background: rgba(16,185,129,0.1); color: var(--free); }
.cc-card .cc-type.paid { background: rgba(245,158,11,0.1); color: var(--paid); }
.cc-card .cc-meta { font-family: "JetBrains Mono",monospace; font-size: 0.72rem; color: var(--text-mute); margin-bottom: 0.5rem; }
.cc-card p { color: var(--text-soft); font-size: 0.85rem; margin: 0.5rem 0 0.6rem; line-height: 1.55; }
.cc-card .cc-go { color: var(--accent); font-weight: 600; font-size: 0.85rem; }

/* Tools 區 */
.cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(290px, 1fr)); gap: 1.2rem; }
.card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.3rem; transition: all 0.2s; position: relative; }
.card:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); border-color: var(--accent); }
.card .ribbon { position: absolute; top: 1rem; right: 1rem; padding: 0.2rem 0.6rem; border-radius: 100px; font-family: "JetBrains Mono",monospace; font-size: 0.65rem; font-weight: 700; }
.card .ribbon.free { background: var(--free); color: white; }
.card .ribbon.freemium { background: var(--paid); color: white; }
.card .ribbon.paid { background: var(--premium); color: white; }
.card .vendor { font-family: "JetBrains Mono",monospace; font-size: 0.7rem; color: var(--text-mute); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.3rem; }
.card h3 { font-size: 1.15rem; margin: 0 0 0.4rem; font-weight: 700; }
.card .price { font-family: "JetBrains Mono",monospace; font-size: 0.85rem; color: var(--free); font-weight: 600; margin-bottom: 0.7rem; padding: 0.3rem 0.5rem; background: rgba(16,185,129,0.05); border-left: 2px solid var(--free); }
.card .price.paid { color: var(--paid); background: rgba(245,158,11,0.05); border-color: var(--paid); }
.card .price.premium { color: var(--premium); background: rgba(239,68,68,0.05); border-color: var(--premium); }
.card .highlight { color: var(--text-soft); font-size: 0.9rem; line-height: 1.55; margin: 0.7rem 0; padding-left: 0.6rem; border-left: 3px solid var(--accent); }
.card .strengths { display: flex; flex-wrap: wrap; gap: 0.3rem; margin: 0.7rem 0; }
.card .strengths span { background: var(--bg-soft); color: var(--text-soft); font-size: 0.7rem; padding: 0.2rem 0.6rem; border-radius: 100px; }
.card .links { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--border); }
.card .links a { font-size: 0.82rem; font-weight: 500; padding: 0.3rem 0.7rem; border-radius: 6px; background: var(--bg-soft); color: var(--accent); }
.card .links a:hover { background: var(--accent); color: white; }
.empty { padding: 3rem; text-align: center; color: var(--text-mute); background: var(--bg-soft); border-radius: var(--radius); }

@media (max-width: 700px) { .yt-grid, .cc-grid, .cards { grid-template-columns: 1fr; } .cat-tabs { top: 3.5rem; } }
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="/">← AI DESK</a>
    <span style="color: var(--text-mute); font-family: 'JetBrains Mono',monospace; font-size: 0.78rem;">CREATOR TOOLKIT</span>
    <a href="/latest">最新 daily →</a>
  </div>
</nav>

<div class="wrap">
<section class="hero">
  <h1 id="cat-title">Creator Toolkit</h1>
  <p class="lead">AI 創作者工具完整目錄 · <strong style="color: var(--youtube)">YouTube 影片優先</strong> · 中文為主 / 英文為輔 · 含官方 / Pricing / Docs 連結</p>
</section>

<div class="cat-tabs" id="cat-tabs"></div>

<!-- YouTube 區 - 最前面 -->
<div id="youtube-section">
  <div class="section-h"><h2>YouTube 影片教學</h2><span class="badge" id="yt-count"></span></div>
  <div class="yt-grid" id="yt-grid"></div>
</div>

<!-- Tools 區 -->
<div id="tools-section" style="display:none;">
  <div class="section-h"><h2>工具列表（免費優先）</h2><span class="badge" id="tools-count"></span></div>
  <div class="cards" id="tools-grid"></div>
</div>

<!-- 文章 / 課程平台 / GitHub repo -->
<div id="docs-section">
  <div class="section-h"><h2>文章 · 平台課程 · GitHub repo</h2><span class="badge" id="docs-count"></span></div>
  <div class="cc-grid" id="docs-grid"></div>
</div>

<!-- 付費課程 -->
<div id="paid-section">
  <div class="section-h"><h2>付費深度課程</h2><span class="badge" id="paid-count"></span></div>
  <div class="cc-grid" id="paid-grid"></div>
</div>

</div>

<script>
var CAT_LABELS = {
  all: '全部', writing: '寫作 / 編輯', image: 'AI 生圖', video: 'AI 影片',
  audio: '音樂 / 配音', coding: '編程 IDE', web: '做網站', mobile: '手機介面',
  design: 'AI 設計', agent: 'AI Agent / 自動化', research: '研究 / 搜尋', productivity: '生產力'
};
function getCat() {
  var path = location.pathname.replace(/\/$/, '');
  var m = path.match(/^\/toolkit\/([a-z]+)$/);
  if (m && m[1] !== 'index') return m[1];
  var u = new URL(location.href);
  return u.searchParams.get('cat') || 'all';
}
function renderTabs(activeCat) {
  document.getElementById('cat-tabs').innerHTML = Object.keys(CAT_LABELS).map(function(k){
    return '<a class="cat-tab' + (k === activeCat ? ' active' : '') + '" href="/toolkit/' + (k === 'all' ? '' : k) + '">' + CAT_LABELS[k] + '</a>';
  }).join('');
}

function makeYtCard(c) {
  var thumbStyle = '';
  var thumbInner = '<span class="yt-label">YOUTUBE</span>';
  if (c.thumbnail_url) {
    thumbStyle = ' style="background-image:url(\''+c.thumbnail_url+'\');background-size:cover;background-position:center;"';
    thumbInner = '<span class="yt-label">YOUTUBE</span><div class="yt-play-overlay">▶</div>';
  } else if (c.thumbnail_accent) {
    thumbStyle = ' style="background:linear-gradient(135deg,'+c.thumbnail_accent+',rgba(0,0,0,0.5));"';
    thumbInner = '<span class="yt-label">YOUTUBE</span><div class="yt-initial">'+(c.thumbnail_initial||'▶')+'</div>';
  }
  return '<div class="yt-card"><a href="' + c.url + '" target="_blank" rel="noopener">' +
    '<div class="yt-thumb"' + thumbStyle + '>' + thumbInner + '</div>' +
    '<div class="yt-body">' +
      '<div class="yt-meta">' + c.provider + ' · ' + (c.topic || '') + '</div>' +
      '<h3>' + c.title + '</h3>' +
      '<p class="yt-desc">' + (c.highlight || '') + '</p>' +
      '<span class="yt-go">前往觀看 →</span>' +
    '</div></a></div>';
}
function makeCcCard(c) {
  var isPaid = (c.type || '').indexOf('paid') > -1;
  var typeLabel = {
    'free-platform': '平台免費',
    'free-github': 'GitHub 免費',
    'free-docs': '官方文件',
    'paid-cohort': '付費 cohort',
    'paid-subscription': '付費訂閱'
  }[c.type] || '免費';
  // 從 URL 抓 domain → 用 Google favicon API（穩）
  var domain = '';
  try { domain = new URL(c.url).hostname; } catch(e) {}
  var favicon = domain ? 'https://www.google.com/s2/favicons?domain=' + domain + '&sz=64' : '';
  return '<div class="cc-card ' + (isPaid ? 'paid' : 'free') + '"><a href="' + c.url + '" target="_blank" rel="noopener">' +
    '<div class="cc-card-inner">' +
      (favicon ? '<img class="cc-favicon" src="' + favicon + '" alt="" loading="lazy">' : '<div class="cc-favicon-fallback">📄</div>') +
      '<div class="cc-card-body">' +
        '<span class="cc-type ' + (isPaid ? 'paid' : 'free') + '">' + typeLabel + '</span>' +
        '<h3>' + c.title + '</h3>' +
        '<div class="cc-meta">' + c.provider + (c.topic ? ' · ' + c.topic : '') + (c.cost && c.cost !== 'free' && c.cost !== '免費' ? ' · ' + c.cost : '') + '</div>' +
        '<p>' + (c.highlight || '') + '</p>' +
        '<span class="cc-go">前往 →</span>' +
      '</div>' +
    '</div>' +
  '</a></div>';
}
function makeToolCard(t) {
  var strengths = (t.strengths || []).map(function(s){return '<span>'+s+'</span>';}).join('');
  var priceClass = t.tier === 'free' ? '' : (t.tier === 'paid' ? 'premium' : 'paid');
  var tierLabel = {free:'FREE',freemium:'FREEMIUM',paid:'PAID'}[t.tier] || t.tier.toUpperCase();
  return '<div class="card">' +
    '<span class="ribbon ' + t.tier + '">' + tierLabel + '</span>' +
    '<div class="vendor">' + t.vendor + '</div>' +
    '<h3>' + t.name + '</h3>' +
    '<div class="price ' + priceClass + '">' + (t.price || '?') + '</div>' +
    '<div class="strengths">' + strengths + '</div>' +
    (t.highlight ? '<p class="highlight">' + t.highlight + '</p>' : '') +
    '<div class="links">' +
      '<a href="' + t.official_url + '" target="_blank" rel="noopener">官網 ↗</a>' +
      (t.pricing_url ? '<a href="' + t.pricing_url + '" target="_blank" rel="noopener">Pricing ↗</a>' : '') +
      (t.docs_url ? '<a href="' + t.docs_url + '" target="_blank" rel="noopener">Docs ↗</a>' : '') +
    '</div>' +
  '</div>';
}

function render(TK, cat) {
  // YouTube 課程（全部都顯示，不依 cat filter）
  var yts = (TK.courses || []).filter(function(c){return (c.type||'').indexOf('youtube') > -1;});
  document.getElementById('yt-grid').innerHTML = yts.length ? yts.map(makeYtCard).join('') : '<div class="empty">沒有 YouTube 影片</div>';
  document.getElementById('yt-count').textContent = yts.length + ' 個影片';

  // 文章 / GitHub / 平台 課程
  var docs = (TK.courses || []).filter(function(c){
    var t = c.type || '';
    return t.indexOf('youtube') < 0 && t.indexOf('paid') < 0;
  });
  document.getElementById('docs-grid').innerHTML = docs.length ? docs.map(makeCcCard).join('') : '<div class="empty">沒有文章課程</div>';
  document.getElementById('docs-count').textContent = docs.length + ' 個資源';

  // 付費
  var paids = (TK.courses || []).filter(function(c){return (c.type||'').indexOf('paid') > -1;});
  document.getElementById('paid-grid').innerHTML = paids.length ? paids.map(makeCcCard).join('') : '<div class="empty">沒有付費課程</div>';
  document.getElementById('paid-count').textContent = paids.length + ' 個課程';

  // Tools (filtered by cat)
  if (cat !== 'all') {
    var tools = TK.tools.filter(function(t){
      return t.category === cat || (t.subcat || []).indexOf(cat) > -1;
    });
    if (tools.length) {
      document.getElementById('tools-section').style.display = '';
      document.getElementById('tools-grid').innerHTML = tools.map(makeToolCard).join('');
      document.getElementById('tools-count').textContent = tools.length + ' 個工具';
    }
  }
}

var cat = getCat();
document.getElementById('cat-title').textContent = (CAT_LABELS[cat] || 'Toolkit');
renderTabs(cat);
fetch('/data/creators-toolkit.json?_=' + Date.now())
  .then(function(r){return r.json();})
  .then(function(TK){ render(TK, cat); })
  .catch(function(e){ document.querySelector('.wrap').innerHTML += '<div class="empty">載入失敗 ' + e + '</div>'; });
</script>
</body>
</html>
