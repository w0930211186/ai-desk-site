<title>404 · Lost in transit | AI DESK</title>
<meta name="robots" content="noindex">

<style>
:root {
  --bg: #000000; --fg: #FFFFFF;
  --mute: #8A8A8A;
  --line: rgba(255, 255, 255, 0.14);
  --f-display: 'Inter Tight', 'Noto Sans TC', -apple-system, sans-serif;
  --f-sans: 'Space Grotesk', 'Noto Sans TC', sans-serif;
  --f-mono: 'JetBrains Mono', 'SF Mono', Menlo, monospace;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
body {
  font-family: var(--f-sans); background: var(--bg); color: var(--fg);
  min-height: 100vh; overflow-x: hidden; display: flex; flex-direction: column;
}
a { color: inherit; text-decoration: none; }
::selection { background: #FFFFFF; color: #000000; }

.nav-top {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  padding: 1.5rem 2rem; display: flex; justify-content: space-between; align-items: center;
  mix-blend-mode: difference;
}
.nav-brand { font-family: var(--f-display); font-weight: 900; font-size: 0.92rem; letter-spacing: 0.04em; text-transform: uppercase; display: flex; align-items: center; gap: 0.6rem; }
.nav-brand .diamond { width: 10px; height: 10px; background: var(--fg); display: inline-block; animation: spin 4s linear infinite; }
@keyframes spin { from { transform: rotate(45deg); } to { transform: rotate(405deg); } }
.nav-links { display: flex; gap: 1.4rem; font-family: var(--f-sans); font-size: 0.72rem; letter-spacing: 0.2em; text-transform: uppercase; font-weight: 500; }
.nav-links a { padding: 0.4rem 0.8rem; border: 1px solid transparent; transition: border-color .25s; }
.nav-links a:hover { border-color: var(--fg); }

main.err-wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 8rem 2rem 4rem; position: relative; overflow: hidden; }
.err-watermark {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  font-family: var(--f-display); font-weight: 900;
  font-size: clamp(14rem, 40vw, 46rem);
  line-height: 0.8; letter-spacing: -0.06em;
  color: transparent; -webkit-text-stroke: 1px rgba(255, 255, 255, 0.08);
  white-space: nowrap; pointer-events: none; user-select: none; z-index: 1;
}

.err-inner { max-width: 760px; text-align: center; position: relative; z-index: 2; }
.err-code {
  font-family: var(--f-display); font-weight: 900;
  font-size: clamp(7rem, 22vw, 18rem);
  line-height: 0.9; letter-spacing: -0.06em;
  color: var(--fg); margin-bottom: 1.5rem;
}
.err-tag {
  font-family: var(--f-sans); font-size: 0.72rem;
  letter-spacing: 0.32em; text-transform: uppercase;
  color: var(--mute); margin-bottom: 2rem;
  display: flex; align-items: center; justify-content: center; gap: 0.8rem;
}
.err-tag .diamond { width: 8px; height: 8px; background: var(--fg); display: inline-block; transform: rotate(45deg); }
.err-title {
  font-family: var(--f-display); font-weight: 800;
  font-size: clamp(1.8rem, 4vw, 2.8rem);
  line-height: 1.1; letter-spacing: -0.02em;
  text-transform: uppercase; margin-bottom: 1.4rem;
}
.err-title em { font-style: normal; color: transparent; -webkit-text-stroke: 1.5px var(--fg); }
.err-body {
  font-family: 'Noto Sans TC', var(--f-sans);
  font-size: 1.1rem; line-height: 1.7;
  color: var(--mute); margin: 0 auto 3rem; max-width: 520px;
}
.err-actions { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
.err-cta {
  display: inline-flex; align-items: center; gap: 0.7rem;
  font-family: var(--f-sans); font-weight: 600;
  font-size: 0.78rem; letter-spacing: 0.24em; text-transform: uppercase;
  padding: 0.8rem 1.4rem; border: 1px solid var(--fg);
  transition: background .3s, color .3s;
}
.err-cta:hover { background: var(--fg); color: var(--bg); }

footer.site-footer {
  padding: 2rem; border-top: 1px solid var(--line);
  font-family: var(--f-mono); font-size: 0.7rem; letter-spacing: 0.16em;
  text-transform: uppercase; color: var(--mute); text-align: center;
  position: relative; z-index: 2;
}

@media (max-width: 700px) {
  .nav-top { padding: 1rem; }
  .nav-links { gap: 0.5rem; font-size: 0.58rem; }
  .nav-links a { padding: 0.3rem 0.5rem; }
  main.err-wrap { padding: 6rem 1rem 3rem; }
  .err-body { font-size: 1rem; }
}


/* ============================================================
   ACCESSIBILITY · v2 (audit 2026-04-25)
   - P0-A: focus-visible 鍵盤導航指示
   - P0-B: prefers-reduced-motion 動畫退場
   - P1-C: 手機觸控目標 ≥ 44px
   - bonus: skip-to-content link
   ============================================================ */

/* P0-A · 鍵盤 focus 指示（mono brutalist 風格） */
*:focus-visible {
  outline: 2px solid var(--fg);
  outline-offset: 3px;
}
.nav-links a:focus-visible,
.back-cta:focus-visible,
.tag-toggle button:focus-visible {
  outline-offset: 1px;
}
.enter-btn:focus-visible {
  outline-offset: 5px;
}
.journal-card:focus-visible {
  outline-offset: -2px;
}

/* bonus · skip-to-content link（a11y best practice） */
.skip-link {
  position: absolute;
  top: -100px;
  left: 1rem;
  z-index: 200;
  padding: 0.7rem 1.2rem;
  background: var(--fg);
  color: var(--bg);
  font-family: var(--f-sans);
  font-size: 0.78rem;
  font-weight: 600;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  text-decoration: none;
  transition: top 0.2s;
}
.skip-link:focus {
  top: 1rem;
}

/* P0-B · prefers-reduced-motion */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
    scroll-behavior: auto !important;
  }
  .diamond,
  .circle-text,
  .float-diamond {
    animation: none !important;
  }
}

/* P1-C · 手機觸控目標 ≥ 44px */
@media (max-width: 700px) {
  .nav-links a {
    min-height: 44px;
    display: inline-flex;
    align-items: center;
    padding: 0.6rem 0.7rem;
    font-size: 0.62rem;
  }
  .tag-toggle button {
    min-height: 44px;
    padding: 0.7rem 1rem;
  }
  .back-cta,
  .enter-btn {
    min-height: 44px;
  }
}



/* ============================================================
   FUNCTIONAL ADDITIONS · v3 (2026-04-25)
   - Email subscribe form
   - Share buttons
   - Pagefind search UI
   - Reading time pill
   ============================================================ */

/* 訂閱表單 */
.subscribe-form {
  display: flex; gap: 0.6rem; flex-wrap: wrap; align-items: stretch;
  margin-top: 0.5rem;
}
.subscribe-form input[type="email"] {
  flex: 1 1 220px; min-width: 0;
  padding: 0.7rem 0.9rem;
  font-family: var(--f-sans); font-size: 0.85rem;
  background: transparent;
  border: 1px solid var(--panel-fg);
  color: inherit;
}
.subscribe-form input[type="email"]:focus {
  outline: 2px solid var(--panel-fg); outline-offset: 2px;
}
.subscribe-form button {
  padding: 0.7rem 1.2rem;
  font-family: var(--f-sans); font-weight: 600;
  font-size: 0.78rem; letter-spacing: 0.2em; text-transform: uppercase;
  background: var(--panel-fg); color: var(--panel);
  border: 1px solid var(--panel-fg); cursor: pointer;
  transition: opacity .2s;
}
.subscribe-form button:hover { opacity: 0.85; }
.subscribe-msg { font-family: var(--f-sans); font-size: 0.72rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--mute-2); margin-top: 0.5rem; min-height: 1em; }

/* 分享按鈕 */
.share-bar {
  margin: 4rem 0 0; padding-top: 2rem;
  border-top: 1px solid var(--line);
  display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap;
}
.share-label {
  font-family: var(--f-mono); font-size: 0.72rem;
  letter-spacing: 0.18em; color: var(--mute);
  text-transform: uppercase; margin-right: 0.5rem;
}
.share-bar a, .share-bar button {
  display: inline-flex; align-items: center; gap: 0.4rem;
  padding: 0.55rem 0.9rem; min-height: 36px;
  font-family: var(--f-sans); font-size: 0.7rem;
  letter-spacing: 0.18em; text-transform: uppercase;
  border: 1px solid var(--line); color: var(--fg);
  background: transparent; cursor: pointer;
  transition: background .2s, color .2s, border-color .2s;
}
.share-bar a:hover, .share-bar button:hover {
  background: var(--fg); color: var(--bg); border-color: var(--fg);
}
.share-bar svg { width: 14px; height: 14px; }

/* Reading time pill (post-meta-top 內) */
.read-time { color: var(--mute); }
.read-time::before { content: "·"; margin-right: 0.5rem; color: var(--mute-2); }

/* Prev/Next 導覽 */
.prev-next {
  margin: 5rem 0 0; padding: 2rem 0; border-top: 1px solid var(--line);
  display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;
}
.prev-next a {
  display: block; padding: 1.2rem 1.4rem;
  border: 1px solid var(--line);
  transition: border-color .2s, background .2s;
}
.prev-next a:hover { border-color: var(--fg); background: rgba(255,255,255,0.03); }
.prev-next a.next { text-align: right; }
.prev-next .label {
  display: block; font-family: var(--f-sans);
  font-size: 0.7rem; letter-spacing: 0.22em;
  color: var(--mute); text-transform: uppercase; margin-bottom: 0.5rem;
}
.prev-next .title {
  display: block; font-family: var(--f-display);
  font-weight: 700; font-size: 1rem; line-height: 1.3;
  letter-spacing: -0.01em; color: var(--fg);
}
@media (max-width: 700px) {
  .prev-next { grid-template-columns: 1fr; }
  .prev-next a.next { text-align: left; }
}

/* Pagefind 搜尋 UI override（mono brutalist 化） */
#search {
  margin: 0 auto 2rem; max-width: 760px;
}
.pagefind-ui__search-input {
  background: transparent !important; color: var(--fg) !important;
  border: 1px solid var(--fg) !important; border-radius: 0 !important;
  font-family: var(--f-sans) !important;
}
.pagefind-ui__result {
  border-bottom: 1px solid var(--line) !important; padding: 1rem 0 !important;
}
.pagefind-ui__result-link {
  color: var(--fg) !important;
  font-family: var(--f-display) !important; font-weight: 700 !important;
}
