<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 · Lost in transit | AI DESK</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;700;800;900&family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #000000; --fg: #FFFFFF;
  --mute: #8A8A8A;
  --line: rgba(255, 255, 255, 0.14);
  --f-display: 'Inter Tight', 'Noto Sans TC', -apple-system, sans-serif;
  --f-sans: 'Space Grotesk', 'Noto Sans TC', sans-serif;
  --f-mono: 'JetBrains Mono', 'SF Mono', Menlo, monospace;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
body {
  font-family: var(--f-sans); background: var(--bg); color: var(--fg);
  min-height: 100vh; overflow-x: hidden; display: flex; flex-direction: column;
}
a { color: inherit; text-decoration: none; }
::selection { background: #FFFFFF; color: #000000; }

.nav-top {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  padding: 1.5rem 2rem; display: flex; justify-content: space-between; align-items: center;
  mix-blend-mode: difference;
}
.nav-brand { font-family: var(--f-display); font-weight: 900; font-size: 0.92rem; letter-spacing: 0.04em; text-transform: uppercase; display: flex; align-items: center; gap: 0.6rem; }
.nav-brand .diamond { width: 10px; height: 10px; background: var(--fg); display: inline-block; animation: spin 4s linear infinite; }
@keyframes spin { from { transform: rotate(45deg); } to { transform: rotate(405deg); } }
.nav-links { display: flex; gap: 1.4rem; font-family: var(--f-sans); font-size: 0.72rem; letter-spacing: 0.2em; text-transform: uppercase; font-weight: 500; }
.nav-links a { padding: 0.4rem 0.8rem; border: 1px solid transparent; transition: border-color .25s; }
.nav-links a:hover { border-color: var(--fg); }

main.err-wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 8rem 2rem 4rem; position: relative; overflow: hidden; }
.err-watermark {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  font-family: var(--f-display); font-weight: 900;
  font-size: clamp(14rem, 40vw, 46rem);
  line-height: 0.8; letter-spacing: -0.06em;
  color: transparent; -webkit-text-stroke: 1px rgba(255, 255, 255, 0.08);
  white-space: nowrap; pointer-events: none; user-select: none; z-index: 1;
}

.err-inner { max-width: 760px; text-align: center; position: relative; z-index: 2; }
.err-code {
  font-family: var(--f-display); font-weight: 900;
  font-size: clamp(7rem, 22vw, 18rem);
  line-height: 0.9; letter-spacing: -0.06em;
  color: var(--fg); margin-bottom: 1.5rem;
}
.err-tag {
  font-family: var(--f-sans); font-size: 0.72rem;
  letter-spacing: 0.32em; text-transform: uppercase;
  color: var(--mute); margin-bottom: 2rem;
  display: flex; align-items: center; justify-content: center; gap: 0.8rem;
}
.err-tag .diamond { width: 8px; height: 8px; background: var(--fg); display: inline-block; transform: rotate(45deg); }
.err-title {
  font-family: var(--f-display); font-weight: 800;
  font-size: clamp(1.8rem, 4vw, 2.8rem);
  line-height: 1.1; letter-spacing: -0.02em;
  text-transform: uppercase; margin-bottom: 1.4rem;
}
.err-title em { font-style: normal; color: transparent; -webkit-text-stroke: 1.5px var(--fg); }
.err-body {
  font-family: 'Noto Sans TC', var(--f-sans);
  font-size: 1.1rem; line-height: 1.7;
  color: var(--mute); margin: 0 auto 3rem; max-width: 520px;
}
.err-actions { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
.err-cta {
  display: inline-flex; align-items: center; gap: 0.7rem;
  font-family: var(--f-sans); font-weight: 600;
  font-size: 0.78rem; letter-spacing: 0.24em; text-transform: uppercase;
  padding: 0.8rem 1.4rem; border: 1px solid var(--fg);
  transition: background .3s, color .3s;
}
.err-cta:hover { background: var(--fg); color: var(--bg); }

footer.site-footer {
  padding: 2rem; border-top: 1px solid var(--line);
  font-family: var(--f-mono); font-size: 0.7rem; letter-spacing: 0.16em;
  text-transform: uppercase; color: var(--mute); text-align: center;
  position: relative; z-index: 2;
}

@media (max-width: 700px) {
  .nav-top { padding: 1rem; }
  .nav-links { gap: 0.5rem; font-size: 0.58rem; }
  .nav-links a { padding: 0.3rem 0.5rem; }
  main.err-wrap { padding: 6rem 1rem 3rem; }
  .err-body { font-size: 1rem; }
}
</style>
</head>
<body>

<nav class="nav-top">
  <a href="/" class="nav-brand">
    <span class="diamond"></span>
    AI DESK
  </a>
  <div class="nav-links">
    <a href="/">Index</a>
    <a href="/posts/">Journal</a>
    <a href="/about.html">About</a>
  </div>
</nav>

<main class="err-wrap">
  <div class="err-watermark">404</div>
  <div class="err-inner">
    <div class="err-code">404</div>
    <div class="err-tag"><span class="diamond"></span>Lost in transit · 走錯路了<span class="diamond"></span></div>
    <h1 class="err-title">This page is <em>off the grid.</em><br>這條路沒有盡頭。</h1>
    <p class="err-body">你要找的東西不在這個座標。可能是舊連結 也可能還沒寫。回首頁看看最新一期 或直接去翻 journal 的全部刊文。</p>
    <div class="err-actions">
      <a href="/" class="err-cta">← 回首頁</a>
      <a href="/posts/" class="err-cta">去看 Journal →</a>
    </div>
  </div>
</main>

<footer class="site-footer">
  AI DESK · © 2026 · INDEPENDENT EDITORIAL
</footer>

</body>
</html>
