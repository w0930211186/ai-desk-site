name: Notify Telegram on AI DESK Push

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'posts/*-daily.html'
      - 'assets/ig-stories/**'
      - 'data/pulse.json'

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changes and notify
        shell: bash
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set -u
          TODAY=$(TZ=Asia/Taipei date +%Y-%m-%d)
          DAILY_FILE="posts/${TODAY}-daily.html"
          IG_DIR="assets/ig-stories/${TODAY}"
          PULSE_FILE="data/pulse.json"
          API="https://api.telegram.org/bot${TG_TOKEN}"
          SITE="https://ai-desk-tw.netlify.app"

          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || true)
          echo "Changed files:"
          echo "$CHANGED"

          # ---- Daily ----
          if echo "$CHANGED" | grep -qx "$DAILY_FILE"; then
            TITLE=$(grep -m1 -oE '<h2>[^<]*' "$DAILY_FILE" 2>/dev/null | sed 's/<h2>//' | head -c 120 || echo "")
            SUMMARY=$(grep -m1 -oE 'name="description" content="[^"]*"' "$DAILY_FILE" 2>/dev/null | sed 's/.*content="//;s/"$//' | head -c 280 || echo "")
            URL="${SITE}/posts/${TODAY}-daily.html"
            MSG="📰 AI DESK ${TODAY} · daily 已上線

${TITLE}

${SUMMARY}

🔗 全文：${URL}
🌐 主頁：${SITE}/latest"
            curl -sf -X POST "${API}/sendMessage" \
              --data-urlencode "chat_id=${TG_CHAT}" \
              --data-urlencode "text=${MSG}" \
              --data-urlencode "disable_web_page_preview=false" || echo "daily notify failed"
            echo "✓ daily notified"
          fi

          # ---- IG Story ----
          if echo "$CHANGED" | grep -q "^${IG_DIR}/"; then
            PNG="${IG_DIR}/story.png"
            CAP="${IG_DIR}/caption.txt"
            if [ -f "$PNG" ]; then
              CAPTION=""
              [ -f "$CAP" ] && CAPTION=$(cat "$CAP")
              curl -sf -X POST "${API}/sendDocument" \
                -F "chat_id=${TG_CHAT}" \
                -F "document=@${PNG}" \
                --form-string "caption=${CAPTION}" || echo "ig sendDocument failed"
              curl -sf -X POST "${API}/sendMessage" \
                --data-urlencode "chat_id=${TG_CHAT}" \
                --data-urlencode "text=📸 IG Story ${TODAY} 素材已備好
從上面 PNG 下載 → IG App → 限動上傳

🌐 ${SITE}" || true
              echo "✓ ig notified"
            fi
          fi

          # ---- Pulse · 每條 item 一條 rich message ----
          if echo "$CHANGED" | grep -qx "$PULSE_FILE"; then
            if [ -f "$PULSE_FILE" ]; then
              # 抓 diff 裡新加的 pulse id
              NEW_IDS=$(git diff HEAD~1 HEAD -- "$PULSE_FILE" 2>/dev/null | grep -oE '^\+\s*"id":\s*"pulse-[^"]+"' | sed 's/.*"id":\s*"//;s/"$//' || true)
              if [ -z "$NEW_IDS" ]; then
                echo "no new pulse items"
                exit 0
              fi
              echo "NEW pulse ids:"
              echo "$NEW_IDS"
              # 對每條 NEW id 推一條 rich message
              while IFS= read -r ID; do
                [ -z "$ID" ] && continue
                python3 -c "
import json, urllib.parse, urllib.request, os
d = json.load(open('${PULSE_FILE}'))
item = next((i for i in d.get('items',[]) if i.get('id')=='${ID}'), None)
if not item: exit(0)
ts = item.get('ts','')[11:16]
title = item.get('title','')
blurb = item.get('blurb','')
src = item.get('source','')
url = item.get('url','')
msg = f'''🔴 PULSE · {ts} · {src}

{title}

{blurb}

🔗 原文：{url}
🌐 主頁：${SITE}/#latest-pulse'''
data = urllib.parse.urlencode({
    'chat_id': '${TG_CHAT}',
    'text': msg,
    'disable_web_page_preview': 'false'
}).encode()
req = urllib.request.Request('${API}/sendMessage', data=data, method='POST')
try:
    with urllib.request.urlopen(req, timeout=15) as r:
        print(f'sent: {item[\"id\"]}')
except Exception as e:
    print(f'fail: {e}')
"
              done <<< "$NEW_IDS"
              echo "✓ pulse items notified"
            fi
          fi

          echo "done"
