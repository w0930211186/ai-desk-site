name: Notify Telegram on AI DESK Push

on:
  push:
    branches: [main]
    paths:
      - 'posts/*-daily.html'
      - 'assets/ig-stories/**'
      - 'data/pulse.json'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changes and notify
        shell: bash
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set -u
          TODAY=$(TZ=Asia/Taipei date +%Y-%m-%d)
          DAILY_FILE="posts/${TODAY}-daily.html"
          IG_DIR="assets/ig-stories/${TODAY}"
          PULSE_FILE="data/pulse.json"
          API="https://api.telegram.org/bot${TG_TOKEN}"

          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || true)
          echo "Changed files:"
          echo "$CHANGED"

          # ---- Daily ----
          if echo "$CHANGED" | grep -qx "$DAILY_FILE"; then
            TITLE=$(grep -m1 -oE '<h2>[^<]*' "$DAILY_FILE" 2>/dev/null | sed 's/<h2>//' | head -c 100 || echo "")
            MSG="AI DESK ${TODAY} daily uploaded\n${TITLE}\n\nhttps://ai-desk-tw.netlify.app/posts/${TODAY}-daily.html"
            curl -sf -X POST "${API}/sendMessage" \
              --data-urlencode "chat_id=${TG_CHAT}" \
              --data-urlencode "text=${MSG}" || echo "daily notify failed"
            echo "✓ daily notified"
          fi

          # ---- IG Story ----
          if echo "$CHANGED" | grep -q "^${IG_DIR}/"; then
            PNG="${IG_DIR}/story.png"
            CAP="${IG_DIR}/caption.txt"
            if [ -f "$PNG" ]; then
              CAPTION=""
              [ -f "$CAP" ] && CAPTION=$(cat "$CAP")
              curl -sf -X POST "${API}/sendDocument" \
                -F "chat_id=${TG_CHAT}" \
                -F "document=@${PNG}" \
                --form-string "caption=${CAPTION}" || echo "ig sendDocument failed"
              curl -sf -X POST "${API}/sendMessage" \
                --data-urlencode "chat_id=${TG_CHAT}" \
                --data-urlencode "text=IG Story ${TODAY} uploaded - download and post to IG Story" || true
              echo "✓ ig notified"
            fi
          fi

          # ---- Pulse ----
          if echo "$CHANGED" | grep -qx "$PULSE_FILE"; then
            if [ -f "$PULSE_FILE" ]; then
              NEW=$(git diff HEAD~1 HEAD -- "$PULSE_FILE" | grep -cE '^\+\s*"id":\s*"pulse-' || echo "0")
              TITLES=$(python3 -c "import json; d=json.load(open('$PULSE_FILE')); print('\n'.join(['- '+(i.get('title') or '')[:60] for i in d.get('items',[])[:3]]))" 2>/dev/null || echo "")
              MSG="PULSE +${NEW} items\n${TITLES}\n\nhttps://ai-desk-tw.netlify.app/#latest-pulse"
              curl -sf -X POST "${API}/sendMessage" \
                --data-urlencode "chat_id=${TG_CHAT}" \
                --data-urlencode "text=${MSG}" || echo "pulse notify failed"
              echo "✓ pulse notified"
            fi
          fi

          echo "done"
