name: Notify Telegram on AI DESK Push

on:
  push:
    branches: [main]
    paths:
      - 'posts/*-daily.html'
      - 'assets/ig-stories/**'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect what changed
        id: detect
        shell: bash
        run: |
          TODAY=$(TZ=Asia/Taipei date +%Y-%m-%d)
          DAILY_FILE="posts/${TODAY}-daily.html"
          IG_DIR="assets/ig-stories/${TODAY}"
          CHANGED=$(git diff --name-only HEAD~1 HEAD || true)
          echo "Changed: $CHANGED"
          HAS_DAILY="false"
          HAS_IG="false"
          if echo "$CHANGED" | grep -qx "$DAILY_FILE"; then HAS_DAILY="true"; fi
          if echo "$CHANGED" | grep -q "^${IG_DIR}/"; then HAS_IG="true"; fi
          echo "has_daily=$HAS_DAILY" >> $GITHUB_OUTPUT
          echo "has_ig=$HAS_IG" >> $GITHUB_OUTPUT
          echo "today=$TODAY" >> $GITHUB_OUTPUT
          echo "daily_file=$DAILY_FILE" >> $GITHUB_OUTPUT
          echo "ig_png=${IG_DIR}/story.png" >> $GITHUB_OUTPUT
          echo "ig_caption=${IG_DIR}/caption.txt" >> $GITHUB_OUTPUT

      - name: Notify daily published
        if: steps.detect.outputs.has_daily == 'true'
        shell: bash
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
          TODAY: ${{ steps.detect.outputs.today }}
          DAILY_FILE: ${{ steps.detect.outputs.daily_file }}
        run: |
          TITLE=$(grep -m1 -oE '<h2>[^<]*' "$DAILY_FILE" | sed 's/<h2>//' | head -c 100)
          MSG="AI DESK ${TODAY} daily uploaded\n${TITLE}\n\nhttps://ai-desk-tw.netlify.app/posts/${TODAY}-daily.html"
          curl -sf -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TG_CHAT}" \
            --data-urlencode "text=${MSG}"

      - name: Notify IG Story
        if: steps.detect.outputs.has_ig == 'true'
        shell: bash
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
          TODAY: ${{ steps.detect.outputs.today }}
          IG_PNG: ${{ steps.detect.outputs.ig_png }}
          IG_CAPTION: ${{ steps.detect.outputs.ig_caption }}
        run: |
          if [ ! -f "$IG_PNG" ]; then
            echo "PNG not found"
            exit 0
          fi
          CAPTION=""
          if [ -f "$IG_CAPTION" ]; then
            CAPTION=$(cat "$IG_CAPTION")
          fi
          curl -sf -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendDocument" \
            -F "chat_id=${TG_CHAT}" \
            -F "document=@${IG_PNG}" \
            --form-string "caption=${CAPTION}"
          curl -sf -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TG_CHAT}" \
            --data-urlencode "text=IG Story ${TODAY} uploaded - download from above and post to IG Story"
