name: Notify Telegram on AI DESK Push

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'posts/*-daily.html'
      - 'assets/ig-stories/**'
      - 'data/pulse.json'
      - 'data/models-feed.json'

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changes and notify
        shell: bash
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set -u
          TODAY=$(TZ=Asia/Taipei date +%Y-%m-%d)
          DAILY_FILE="posts/${TODAY}-daily.html"
          IG_DIR="assets/ig-stories/${TODAY}"
          PULSE_FILE="data/pulse.json"
          MODELS_FILE="data/models-feed.json"
          API="https://api.telegram.org/bot${TG_TOKEN}"
          SITE="https://ai-desk-tw.netlify.app"

          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || true)
          echo "Changed: $CHANGED"

          # Daily
          if echo "$CHANGED" | grep -qx "$DAILY_FILE"; then
            TITLE=$(grep -m1 -oE '<h2>[^<]*' "$DAILY_FILE" 2>/dev/null | sed 's/<h2>//' | head -c 120 || echo "")
            URL="${SITE}/posts/${TODAY}-daily.html"
            MSG=$(printf "📰 AI DESK %s · daily 已上線\n\n%s\n\n🔗 全文：%s\n🌐 主頁：%s/latest" "$TODAY" "$TITLE" "$URL" "$SITE")
            curl -sf -X POST "${API}/sendMessage" --data-urlencode "chat_id=${TG_CHAT}" --data-urlencode "text=${MSG}" || echo "daily fail"
            echo "✓ daily"
          fi

          # IG
          if echo "$CHANGED" | grep -q "^${IG_DIR}/"; then
            PNG="${IG_DIR}/story.png"
            CAP="${IG_DIR}/caption.txt"
            if [ -f "$PNG" ]; then
              CAPTION=""
              [ -f "$CAP" ] && CAPTION=$(cat "$CAP")
              curl -sf -X POST "${API}/sendDocument" -F "chat_id=${TG_CHAT}" -F "document=@${PNG}" --form-string "caption=${CAPTION}" || echo "ig fail"
              MSG=$(printf "📸 IG Story %s 素材已備好\n從上面 PNG 下載 → IG 限動上傳\n\n🌐 %s" "$TODAY" "$SITE")
              curl -sf -X POST "${API}/sendMessage" --data-urlencode "chat_id=${TG_CHAT}" --data-urlencode "text=${MSG}" || true
              echo "✓ ig"
            fi
          fi

          # Pulse · 每條短篇專欄 rich
          if echo "$CHANGED" | grep -qx "$PULSE_FILE"; then
            if [ -f "$PULSE_FILE" ]; then
              NEW_IDS=$(git diff HEAD~1 HEAD -- "$PULSE_FILE" 2>/dev/null | grep -oE '^\+\s*"id":\s*"pulse-[^"]+"' | sed 's/.*"id":\s*"//;s/"$//' || true)
              if [ -z "$NEW_IDS" ]; then
                echo "no new pulse"
                exit 0
              fi
              echo "NEW: $NEW_IDS"
              while IFS= read -r ID; do
                [ -z "$ID" ] && continue
                TITLE=$(jq -r --arg id "$ID" '.items[] | select(.id == $id) | .title' "$PULSE_FILE")
                BLURB=$(jq -r --arg id "$ID" '.items[] | select(.id == $id) | .blurb' "$PULSE_FILE")
                SRC=$(jq -r --arg id "$ID" '.items[] | select(.id == $id) | .source' "$PULSE_FILE")
                URL=$(jq -r --arg id "$ID" '.items[] | select(.id == $id) | .url' "$PULSE_FILE")
                TS=$(jq -r --arg id "$ID" '.items[] | select(.id == $id) | .ts' "$PULSE_FILE" | cut -d'T' -f2 | cut -c1-5)
                EDITORIAL=$(jq -r --arg id "$ID" '.items[] | select(.id == $id) | .editorial // ""' "$PULSE_FILE" | sed 's/<[^>]*>/ /g' | tr -s '[:space:]' ' ' | sed 's/^ //;s/ $//')
                HAS_EDIT=""
                [ -n "$EDITORIAL" ] && HAS_EDIT="$(printf '\n\n📖 短篇專欄\n\n%s' "$EDITORIAL")"
                MSG=$(printf "🔴 PULSE · %s · %s\n\n%s\n\n🌐 看完整專欄 → %s/#pulse-%s\n\n%s%s\n\n— 原文 (%s) %s" "$TS" "$SRC" "$TITLE" "$SITE" "$ID" "$BLURB" "$HAS_EDIT" "$SRC" "$URL")
                curl -sf -X POST "${API}/sendMessage" --data-urlencode "chat_id=${TG_CHAT}" --data-urlencode "text=${MSG}" && echo "✓ sent $ID" || echo "✗ fail $ID"
              done <<< "$NEW_IDS"
            fi
          fi

          # Models · 每條 model_card + editorial rich
          if echo "$CHANGED" | grep -qx "$MODELS_FILE"; then
            if [ -f "$MODELS_FILE" ]; then
              M_NEW_IDS=$(git diff HEAD~1 HEAD -- "$MODELS_FILE" 2>/dev/null | grep -oE '^\+\s*"id":\s*"models-[^"]+"' | sed 's/.*"id":\s*"//;s/"$//' || true)
              if [ -z "$M_NEW_IDS" ]; then
                echo "no new models"
              else
                echo "NEW models: $M_NEW_IDS"
                while IFS= read -r MID; do
                  [ -z "$MID" ] && continue
                  TITLE=$(jq -r --arg id "$MID" '.items[] | select(.id == $id) | .title' "$MODELS_FILE")
                  BLURB=$(jq -r --arg id "$MID" '.items[] | select(.id == $id) | .blurb' "$MODELS_FILE")
                  SRC=$(jq -r --arg id "$MID" '.items[] | select(.id == $id) | .source' "$MODELS_FILE")
                  URL=$(jq -r --arg id "$MID" '.items[] | select(.id == $id) | .url' "$MODELS_FILE")
                  VENDOR=$(jq -r --arg id "$MID" '.items[] | select(.id == $id) | .model_card.vendor // ""' "$MODELS_FILE")
                  NAME=$(jq -r --arg id "$MID" '.items[] | select(.id == $id) | .model_card.name // ""' "$MODELS_FILE")
                  CTX=$(jq -r --arg id "$MID" '.items[] | select(.id == $id) | .model_card.context_window // ""' "$MODELS_FILE")
                  PIN=$(jq -r --arg id "$MID" '.items[] | select(.id == $id) | .model_card.pricing_input // ""' "$MODELS_FILE")
                  POUT=$(jq -r --arg id "$MID" '.items[] | select(.id == $id) | .model_card.pricing_output // ""' "$MODELS_FILE")
                  EDITORIAL=$(jq -r --arg id "$MID" '.items[] | select(.id == $id) | .editorial // ""' "$MODELS_FILE" | sed 's/<[^>]*>/ /g' | tr -s '[:space:]' ' ' | sed 's/^ //;s/ $//')
                  SPECS=""
                  [ -n "$VENDOR" ] && SPECS="$SPECS\n📦 ${VENDOR} · ${NAME}"
                  [ -n "$CTX" ] && SPECS="$SPECS\n   Context: ${CTX}"
                  [ -n "$PIN" ] && SPECS="$SPECS\n   Input: ${PIN} / 1M tokens"
                  [ -n "$POUT" ] && SPECS="$SPECS\n   Output: ${POUT} / 1M tokens"
                  HAS_EDIT=""
                  [ -n "$EDITORIAL" ] && HAS_EDIT="$(printf '\n\n📖 短篇專欄\n\n%s' "$EDITORIAL")"
                  MSG=$(printf "🤖 MODELS · %s · %s\n\n%s\n\n🌐 看完整 spec + 專欄 → %s/#%s\n\n%s%s%s\n\n— 原文 (%s) %s" "$TODAY" "$SRC" "$TITLE" "$SITE" "$MID" "$BLURB" "$SPECS" "$HAS_EDIT" "$SRC" "$URL")
                  curl -sf -X POST "${API}/sendMessage" --data-urlencode "chat_id=${TG_CHAT}" --data-urlencode "text=${MSG}" && echo "✓ sent $MID" || echo "✗ fail $MID"
                done <<< "$M_NEW_IDS"
              fi
            fi
          fi

          echo "done"
